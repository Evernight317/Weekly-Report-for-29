<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者大会</title>
</head>
<body>
    <h1>2024 前端开发者大会 · 报名表单</h1>
    <hr>

    <h2>一、基本信息</h2>
    <form action="">
    用户姓名：<input type="text" placeholder="请输入真实姓名" ><br>
    <br>
    登陆密码：<input type="text" placeholder="请输入6-12位密码" ><br>
    <br>
    
        
        <label >性别： <input type="radio" name="sex" checked>男</label>
        <label ><input type="radio" name="sex" >女</label>
        <label ><input type="radio" name="sex" >保密</label>
    
    <h2>二、技术背景</h2>

    所在城市： <select >
        <option >北京</option>
        <option selected>上海</option>
        <option >广州</option>
        <option >深圳</option>
    </select>
    <br>
    <br>
    感兴趣的方向： 
    <input type="checkbox" >HTML5
    <input type="checkbox" >CSS3
    <input type="checkbox" >JavaScript
    <input type="checkbox" > Vue.js<br>

    <h2>三、大会日程简表</h2>
    <table border="1"width=400 cellspacing="0">
        <tr>
            <th>时间</th>
            <th>主题</th>
        </tr>
        <tr>
            <td>09:00 - 10:30</td>
            <td>前端现状与未来</td>
        </tr>
        <tr>
            <td>10:40 - 12:00</td>
            <td>性能优化实战</td>
        </tr>
    </table>
    <h2>四、其他信息</h2>
    <p>个人简介：</p>
    
    <textarea cols="50" rows="5" placeholder="请简单介绍以下你自己..."></textarea>
    <p>大会相关协议：</p>
    <ul>
        <li><a href="#">《参会守则》</a></li>
        <li><a href="#">《隐私声明》</a></li>
    </ul>
    
        <input type="checkbox" checked>我已阅读并同意以上协议
        <br><br>
        <button type="submit">提交报名</button>
        <button type="reset">重置表单</button>
    </form>
    <p>© 2024 前端学习笔记版    联系我们：admin@example.com</p>
</body>
</html>
